[mcp]
presets = []

[mcp.mcpServers]

[language_servers.pylsp]
enable_ruff = true
enable_pydocstyle = false
enable_pylint = false
enable_mypy = true
enabled = true
enable_flake8 = false
enable_pyflakes = false

[diagnostics]
sql_linter = true

[package_management]
manager = "uv"

[completion]
copilot = "github"
activate_on_typing = true

[server]
follow_symlink = false
browser = "default"

[save]
autosave_delay = 1000
autosave = "off"
format_on_save = true

[keymap]
destructive_delete = true
preset = "default"

[keymap.overrides]

[runtime]
reactive_tests = true
default_sql_output = "auto"
auto_reload = "off"
std_stream_max_bytes = 1000000
output_max_bytes = 8000000
watcher_on_save = "lazy"
auto_instantiate = true
default_auto_download = []
pythonpath = []
on_cell_change = "autorun"

[display]
theme = "light"
default_width = "medium"
default_table_page_size = 10
default_table_max_columns = 50
code_editor_font_size = 14
cell_output = "above"
dataframes = "rich"
reference_highlighting = false

[formatting]
line_length = 99

[experimental]

[snippets]
custom_paths = []
include_default_snippets = true

[ai]
mode = "manual"
rules = ""
inline_tooltip = false

[ai.models]
custom_models = []
displayed_models = []
